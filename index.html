<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover"
    />
    <title>Tictactoe</title>
    <script>
      // Remote debugging aid: open the site with ?debug in the URL to show a
      // live overlay of input events, JS errors, and app boot status.
      (function () {
        if (!/[?&]debug/.test(location.search)) return;
        var el = document.createElement("div");
        el.style.cssText =
          "position:fixed;top:0;left:0;right:0;z-index:99999;background:rgba(0,0,0,.85);" +
          "color:#0f0;font:12px/1.4 monospace;padding:6px;pointer-events:none;white-space:pre-wrap;";
        var counts = {
          touchstart: 0,
          touchend: 0,
          pointerdown: 0,
          pointerup: 0,
          pointercancel: 0,
          click: 0,
        };
        var errors = [];
        function render() {
          var line = Object.keys(counts)
            .map(function (k) { return k + ":" + counts[k]; })
            .join("  ");
          el.textContent =
            "boot:" + (window.__bootStatus || "starting") + "\n" + line +
            (window.__vlTracking ? "\nvl-tracking:" + window.__vlTracking : "") +
            (errors.length ? "\nERR " + errors.slice(-3).join(" | ") : "");
        }
        Object.keys(counts).forEach(function (t) {
          window.addEventListener(t, function () { counts[t]++; render(); }, true);
        });
        window.addEventListener("error", function (e) {
          errors.push(e.message || "unknown error");
          render();
        });
        window.addEventListener("unhandledrejection", function (e) {
          var r = e.reason;
          errors.push((r && r.message) || String(r));
          render();
        });
        setInterval(render, 500);
        function attach() { document.body.appendChild(el); render(); }
        if (document.body) attach();
        else document.addEventListener("DOMContentLoaded", attach);
      })();
    </script>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overscroll-behavior: none;
      }
      /* touch-action: none is required for taps to reach the canvas on iOS
         Safari — without it, WebKit claims touches for scroll/double-tap-zoom
         gestures and fires pointercancel, so panel buttons never get clicks. */
      #scene-container,
      #scene-container canvas {
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #scene-container {
        position: fixed;
        inset: 0;
      }
      #scene-container canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="scene-container"></div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
